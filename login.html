<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartQueue Login</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #333;
      }
      .container {
        background: #ffffff;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 86, 179, 0.1);
        width: 100%;
        max-width: 420px;
      }
      h2 {
        text-align: center;
        color: #0056b3;
        margin-bottom: 30px;
        font-weight: 700;
        font-size: 1.8rem;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.95rem;
        font-weight: 600;
        color: #4a5568;
      }
      input {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #cbd5e0;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s ease;
        background-color: #f8fafc;
      }
      input:focus {
        outline: none;
        border-color: #0056b3;
        background-color: #ffffff;
        box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.15);
      }
      .help-text {
        font-size: 0.85rem;
        color: #718096;
        margin-top: 6px;
      }
      .error {
        color: #e53e3e;
        font-size: 0.85rem;
        margin-top: 6px;
        display: none;
        font-weight: 500;
      }
      .password-row {
        position: relative;
      }
      .toggle-btn {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        border: none;
        background: transparent;
        color: #0056b3;
        font-weight: 600;
        cursor: pointer;
        padding: 4px 6px;
      }
      button[type="submit"] {
        width: 100%;
        padding: 14px;
        background-color: #0056b3;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
        box-shadow: 0 4px 6px rgba(0, 86, 179, 0.2);
      }
      button[type="submit"]:hover {
        background-color: #004494;
        box-shadow: 0 6px 12px rgba(0, 86, 179, 0.3);
        transform: translateY(-1px);
      }
      button[type="submit"]:active {
        transform: translateY(1px);
        box-shadow: 0 2px 4px rgba(0, 86, 179, 0.2);
      }
      .link-row {
        text-align: center;
        margin-top: 16px;
        font-size: 0.9rem;
      }
      .link-row a {
        color: #0056b3;
        text-decoration: none;
        font-weight: 600;
      }
      .link-row a:hover {
        text-decoration: underline;
      }
      .caps-warning {
        color: #dd6b20;
        font-size: 0.85rem;
        margin-top: 6px;
        display: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>SmartQueue Login</h2>

      <form id="loginForm" action="../backend/process_login.php" method="POST" novalidate>
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" placeholder="john@example.com" autocomplete="email" required />
          <span class="error" id="emailError">Please enter a valid email address.</span>
        </div>

        <div class="form-group">
          <label for="password">Password:</label>
          <div class="password-row">
            <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required minlength="6" />
            <button type="button" class="toggle-btn" id="togglePassword" aria-label="Show password">Show</button>
          </div>
          <div class="help-text">Use the same password you registered with. Minimum 6 characters.</div>
          <div class="caps-warning" id="capsWarning">Caps Lock is on.</div>
          <span class="error" id="passwordError">Password must be at least 6 characters.</span>
        </div>

        <button type="submit">Log In</button>
      </form>

      <div class="link-row">
        New here? <a href="index.html">Create an account</a>
      </div>
    </div>
    <script src="login.js"></script>
  </body>
</html>
