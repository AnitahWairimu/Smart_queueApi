<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartQueue Registration</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #333;
      }
      .container {
        background: #ffffff;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 86, 179, 0.1);
        width: 100%;
        max-width: 420px;
      }
      h2 {
        text-align: center;
        color: #0056b3; /* Primary Blue */
        margin-bottom: 30px;
        font-weight: 700;
        font-size: 1.8rem;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.95rem;
        font-weight: 600;
        color: #4a5568;
      }
      input {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #cbd5e0;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s ease;
        background-color: #f8fafc;
      }
      input:focus {
        outline: none;
        border-color: #0056b3;
        background-color: #ffffff;
        box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.15);
      }
      button {
        width: 100%;
        padding: 14px;
        background-color: #0056b3;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 15px;
        box-shadow: 0 4px 6px rgba(0, 86, 179, 0.2);
      }
      button:hover {
        background-color: #004494;
        box-shadow: 0 6px 12px rgba(0, 86, 179, 0.3);
        transform: translateY(-1px);
      }
      button:active {
        transform: translateY(1px);
        box-shadow: 0 2px 4px rgba(0, 86, 179, 0.2);
      }
      .error {
        color: #e53e3e;
        font-size: 0.85rem;
        margin-top: 6px;
        display: none;
        font-weight: 500;
      }
      .strength-meter {
        height: 6px;
        width: 100%;
        background-color: #edf2f7;
        margin-top: 10px;
        border-radius: 10px;
        overflow: hidden;
      }
      .strength-bar {
        height: 100%;
        width: 0;
        border-radius: 10px;
        transition: width 0.4s ease-in-out, background-color 0.4s ease-in-out;
      }
      .strength-text {
        font-size: 0.85rem;
        margin-top: 6px;
        font-weight: 600;
        color: #718096;
        text-align: right;
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>SmartQueue Registration</h2>

      <form id="registrationForm" action="../backend/process_registration.php" method="POST">
        <div class="form-group">
          <label for="name">Full Name:</label>
          <input type="text" id="name" name="name" placeholder="Enter your full name" />
          <span class="error" id="nameError">Name must be at least 3 characters long.</span>
        </div>

        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" name="email" placeholder="john@example.com" />
          <span class="error" id="emailError">Please enter a valid email address.</span>
        </div>

        <div class="form-group">
          <label for="password">Password:</label>
          <input type="password" id="password" name="password" placeholder="Create a strong password" />
          <div class="strength-meter">
            <div class="strength-bar" id="strengthBar"></div>
          </div>
          <div class="strength-text" id="strengthText"></div>
          <span class="error" id="passwordError">Password is required.</span>
        </div>

        <div class="form-group">
          <label for="role">Role:</label>
          <select id="role" name="role" style="width: 100%; padding: 12px 15px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 1rem; background-color: #f8fafc;">
            <option value="staff">Staff</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <button type="submit">Create Account</button>
      </form>
    </div>
    <script src="validation.js"></script>
  </body>
</html>
